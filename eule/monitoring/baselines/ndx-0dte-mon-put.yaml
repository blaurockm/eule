strategy_name: ndx-0dte-mon-put
strategy_class: quanta.zerodte.combo_strategy.ComboStrategy
dachs_project: silbern-marder
environments: [staging-ibkr]

entry:
  weekdays: [0]
  time: "14:30"
  timezone: "US/Eastern"

fsm:
  valid_states: [EVALUATING, FLAT, PENDING_FILL, IN_POSITION, ERROR]
  expectations:
    - condition: "not Monday"
      expected: FLAT
    - condition: "Monday after 15:00 ET"
      expected: [IN_POSITION, FLAT]
    - condition: "after 16:00 ET"
      expected: [FLAT, IN_POSITION]

metrics:
  win_rate:
    expected: 1.0
    warn_below: 0.90
    lookback_trades: 20
  max_daily_loss:
    warn_below: -1000.0
  trade_frequency:
    expected_per_week: 1.0
    warn_if_zero_days: 10
  max_consecutive_losses:
    warn_threshold: 2

health:
  max_error_count: 0
  min_events_delta: 0
  worker_alive: true
  circuit_breaker_closed: true
  max_queue_size: 50
