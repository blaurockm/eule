strategy_name: gld-1dte-thu-put
strategy_class: quanta.zerodte.combo_strategy.ComboStrategy
dachs_project: silbern-marder
environments: [staging-ibkr]

entry:
  weekdays: [3]
  time: "11:00"
  timezone: "US/Eastern"

fsm:
  valid_states: [EVALUATING, FLAT, PENDING_FILL, IN_POSITION, ERROR]
  expectations:
    - condition: "not Thursday"
      expected: FLAT
    - condition: "Thursday after 11:30 ET"
      expected: [IN_POSITION, FLAT]
    - condition: "Friday after 16:00 ET"
      expected: FLAT

metrics:
  win_rate:
    expected: 0.78
    warn_below: 0.65
    lookback_trades: 20
  max_daily_loss:
    warn_below: -500.0
  trade_frequency:
    expected_per_week: 1.0
    warn_if_zero_days: 10
  max_consecutive_losses:
    warn_threshold: 4

health:
  max_error_count: 0
  min_events_delta: 0
  worker_alive: true
  circuit_breaker_closed: true
  max_queue_size: 50
