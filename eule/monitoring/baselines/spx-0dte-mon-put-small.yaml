strategy_name: spx-0dte-mon-put-small
strategy_class: quanta.zerodte.combo_strategy.ComboStrategy
dachs_project: silbern-marder
environments: [real2-ibkr]

entry:
  weekdays: [0]
  time: "10:00"
  timezone: "US/Eastern"

fsm:
  valid_states: [EVALUATING, FLAT, PENDING_FILL, IN_POSITION, ERROR]
  expectations:
    - condition: "not Monday"
      expected: FLAT
    - condition: "Monday before 10:00 ET"
      expected: FLAT
    - condition: "Monday after 10:30 ET"
      expected: [IN_POSITION, PENDING_FILL]
    - condition: "after 16:00 ET"
      expected: [FLAT, IN_POSITION]

metrics:
  win_rate:
    expected: 0.922
    warn_below: 0.80
    lookback_trades: 20
  max_daily_loss:
    warn_below: -500.0
  trade_frequency:
    expected_per_week: 1.0
    warn_if_zero_days: 10
  max_consecutive_losses:
    warn_threshold: 3

health:
  max_error_count: 0
  min_events_delta: 0
  worker_alive: true
  circuit_breaker_closed: true
  max_queue_size: 50
