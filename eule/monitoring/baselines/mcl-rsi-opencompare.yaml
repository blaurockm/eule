strategy_name: mcl-rsi-opencompare
strategy_class: quanta.gelb_donner.strategy.CLRsiOpenCompare
dachs_project: gelb-donner
environments: [staging-ibkr]

entry:
  weekdays: [0, 1, 2, 3, 4]
  time: "17:05"
  timezone: "US/Eastern"

fsm:
  valid_states: [FLAT, SIGNAL, PENDING_ENTRY, ENTERING, IN_POSITION, PENDING_EXIT, EXITING]
  expectations:
    - condition: "any time"
      expected: [FLAT, IN_POSITION]

metrics:
  win_rate:
    expected: 0.65
    warn_below: 0.40
    lookback_trades: 10
  profit_factor:
    expected: 2.48
  max_daily_loss:
    warn_below: -200.0
  trade_frequency:
    expected_per_week: 0.13
    warn_if_zero_days: 60
  max_consecutive_losses:
    warn_threshold: 4

health:
  max_error_count: 0
  min_events_delta: 0
  worker_alive: true
  circuit_breaker_closed: true
  max_queue_size: 50
